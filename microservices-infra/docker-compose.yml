services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1 # node identifier
      KAFKA_PROCESS_ROLES: broker,controller # broker (messages), controller (coordination)
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093 # 9092 (spring), 9093 (intern)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092 # where to find it
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093 # define leader (this same node)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1 # Only 1 node (there are no replicas)
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs