server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/billing_db
    username: postgres
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
      # ddl-auto: create-drop
    show-sql: true

  security:
    oauth2:
      resourceserver:
        jwt: 
          secret-key: ${JWT_SECRET}

  # kafka configuration
  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all # Kafka confirmes secure writing
      retries: 10 # automatic retries
      properties:
        enable.idempotence: true # avoid duplicates in producer

    consumer:
      group-id: billing-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: false # manual commit

    properties:
      spring.json.trusted.packages: "*"

# Register on Eureka
eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  tracing:
    sampling:
      probability: "1.0" # capture all requests (dev only)
    propagation:
      type: w3c

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

  endpoints:
    web:
      exposure:
        include: "*"