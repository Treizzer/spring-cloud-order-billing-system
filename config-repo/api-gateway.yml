server:
  port: 8080

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

spring:
  cloud:
    gateway:
      routes:
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - RewritePath=/api/orders(?<segment>/?.*), /v1/orders${segment}
        
        - id: billing-service
          uri: lb://billing-service
          predicates:
            - Path=/api/billings/**
          filters:
            - RewritePath=/api/billings(?<segment>/?.*), /v1/billings${segment}

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${JWT_SECRET}

management:
  tracing:
    sampling:
      probability: "1.0" # capture all requests (dev only)
    propagation:
      type: w3c
  
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

  endpoints:
    web:
      exposure:
        include: "*"
