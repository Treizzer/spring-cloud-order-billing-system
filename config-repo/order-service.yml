server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/orders_db
    username: root
    password:
  # Dev only. In production, you'd use migrations with Flyway or Liquibase.
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    oauth2:
      resourceserver:
        jwt: 
          secret-key: ${JWT_SECRET}

# Register on Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# Resilience4j
resilience4j:
  retry:
    instances:
      billingService:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - feign.FeignException

